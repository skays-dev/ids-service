server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ids-service
  config:
    import:
      - optional:classpath:databases_conf.yml
      - optional:classpath:security.yml
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true